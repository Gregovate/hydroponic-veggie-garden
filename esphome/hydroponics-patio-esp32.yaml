# hydroponics-patio-esp32.yaml
# Created for D1 mini 23-06-16
# Changed GPIO pins for HX711
# Added outputs for 3 relays to control water level & dosing pumps
# Rebuilt scale with new sensors and Added tare button 25-07-12
# Removed tare button added 25-07-12 on 25-07-13
# removed Tank Gallon Calculation 25-07-15 
# Converted to ESP32 25-07-26
# Added Inline comments during debuging
# Tested and functional 25-07-29
# Adding Dosing History Sensors for tracking 25-08-01
# ✅ ID Replacements 25-08-03
# Old ID	New ID
# last_pump_a_runtime	pump_a_runtime_sensor
# last_pump_b_runtime	pump_b_runtime_sensor
# last_dose_a_ml	dose_a_ml
# last_dose_b_ml	dose_b_ml
# override_a_remaining_time	pump_a_runtime
# override_b_remaining_time	pump_b_runtime
# dose_timer_a	REMOVE (use runtime accumulation)
# dose_timer_b	REMOVE (use runtime accumulation)
# current_dose_ml	dose_a_ml (and dose_b_ml)
# Fixed ESP-Override Dosing Interval 25-08-04
# removed hard top-off line 574 25-08-04

esphome:
  name: hydroponics-patio-esp32
  friendly_name: hydroponics-outside

  on_boot:
    priority: -200  # Run as early as possible
    then:
      - output.turn_off: gpio_nutrient_pump_a
      - output.turn_off: gpio_nutrient_pump_b
      - output.turn_off: gpio_water_fill_solenoid
      - lambda: |-
          id(dose_a_ml_ESP) = 0.0;
          id(dose_a_ml).publish_state(0.0);

          id(dose_b_ml_ESP) = 0.0;
          id(dose_b_ml).publish_state(0.0);

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Dosing pump timing and reporting revised block 25-08-03
# This structure cleanly separates timers from published values.
# The runtime sensors will be updated only when pump turns off.
# The dose amount is stored alongside the runtime, making it easy to confirm dose consistency.
# Home Assistant will have clear state: pump ran for X seconds and dispensed Y mL.
globals:
  # ⏱ Runtime timer for Pump A (starts on turn_on, stops on turn_off)
  - id: pump_a_start_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # ⏱ Final runtime for Pump A (in seconds, published to HA)
  - id: pump_a_runtime_ESP
    type: float
    restore_value: no
    initial_value: '0.0'

  # 🧴 Dose amount for Pump A (in mL, published to HA)
  - id: dose_a_ml_ESP
    type: float
    restore_value: no
    initial_value: '0.0'

  # Flag to track if Pump A is currently running (prevents early shutoff) 25-08-03
  - id: pump_a_running
    type: bool
    restore_value: no
    initial_value: 'false'

  # Create a dwell timer to ensure Pump B waits 5 sec before starting 25-08-03
  - id: dwell_timer
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Flag to check for pump B to run 25-08-03
  - id: pump_b_waiting
    type: bool
    restore_value: no
    initial_value: 'false'

  # Flag to track if Pump B is currently running (prevents early shutoff) 25-08-03
  - id: pump_b_running
    type: bool
    restore_value: no
    initial_value: 'false'

  # ⏱ Runtime timer for Pump B
  - id: pump_b_start_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # ⏱ Final runtime for Pump B
  - id: pump_b_runtime_ESP
    type: float
    restore_value: no
    initial_value: '0.0'

  # 🧴 Dose amount for Pump B
  - id: dose_b_ml_ESP
    type: float
    restore_value: no
    initial_value: '0.0'

  # 💧 Last fill amount in gallons (after manual fill)
  - id: last_fill_gallons_ESP
    type: float
    restore_value: no
    initial_value: '0.0'

  # ⏱ Fill cycle start timestamp (millis)
  - id: fill_start_time
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # 🚰 Fill state (0 = IDLE, 1 = RUNNING, 2 = COMPLETE)
  - id: fill_state
    type: int
    restore_value: no
    initial_value: '0'


# Enable logging
logger:
  level: VERBOSE
  logs:
    sensor: WARN
    ads1115.sensor: WARN
    pulse_counter: WARN
    hx711: WARN
    dallas.sensor: WARN
    component: WARN
    main: DEBUG
    manual_fill: DEBUG

# Enable Home Assistant API
api:

ota:
  - platform: esphome  # Your existing OTA method
  - platform: web_server  # Add this for web-based OTA uploads

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Hydroponics-Patio-Esp32"
    password: "9zpm8sHTAuuT"

captive_portal:
    
web_server:
  port: 80

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

time:
  - platform: homeassistant
    id: esptime  # Required to get correct local time from HA

ads1115:
  - address: 0x48  # Default I2C address for ADS1115
    id: ads1115_outside

one_wire:
  - platform: gpio
    pin: GPIO26  # GPIO26 — Dallas/OneWire

status_led:
  pin:
    number: GPIO2  # GPIO2 — onboard LED
    inverted: False

# Binary sensor to allow enabling/disabling updates
binary_sensor:
  - platform: homeassistant
    id: hydroponics_outside_enabled
    entity_id: input_boolean.hydroponics_outside

sensor:
  - platform: dallas_temp
    address: 0x2D3C01D075031A28
    accuracy_decimals: 1
    filters:
      - lambda: return x * (9.0/5.0) + 32.0;
    unit_of_measurement: "°F"
    name: "Tank Temp"

  - platform: hx711
    name: "Raw HX711 Sensor"
    id: hx711_sensor
    dout_pin: GPIO4  # From D5 on D1 Mini
    clk_pin: GPIO23   # Updated from D1 (ESP8266)
    gain: 128
    update_interval: 1s
    accuracy_decimals: 0
    unit_of_measurement: "raw"
    filters:
      - lambda: |-
          return x;
      - sliding_window_moving_average:
          window_size: 15
          send_every: 5

  - platform: pulse_counter
    pin: GPIO25  # East channel
    name: "East Channel Flow"
    id: flow_east_patio
    unit_of_measurement: "L/min"
    update_interval: 1s
    accuracy_decimals: 2
    filters:
      - lambda: return x * 0.002235;
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      - heartbeat: 30s

  - platform: pulse_counter
    pin: GPIO18  # West channel
    name: "West Channel Flow"
    id: flow_west_patio
    unit_of_measurement: "L/min"
    update_interval: 1s
    accuracy_decimals: 2
    filters:
      - lambda: return x * 0.002235;
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      - heartbeat: 30s

  - platform: pulse_counter
    pin: GPIO19
    id: fill_pulses
    internal: true
    name: "Fill Pulses"
    unit_of_measurement: "pulses"  # Optional: keep for diagnostics or remove
    update_interval: 1s
    accuracy_decimals: 2
    filters:
      - lambda: return x;

    total:
      name: "Fill Gallons"
      id: fill_gallons
      unit_of_measurement: "gal"
      accuracy_decimals: 2
      filters:
        #- lambda: return x / 1690.0;  # 👈 Accurate calibration: 8450 pulses = 5 gallons
        - lambda: return x / 1470.0;  # 2026-06-03 recalibration: ESP read 2.0 gal, actual was 2.3 gal 26-06-03

  # TDS meter input via ADS1115 A0
  - platform: ads1115
    ads1115_id: ads1115_outside
    multiplexer: 'A0_GND'
    gain: 4.096  #updated from 2.048 25-07-27
    name: "TDS Raw"
    id: tds_raw
    update_interval: 2s
    accuracy_decimals: 3
    unit_of_measurement: "V"

  # Calibration for TDS meter rough pass 25-07-27
  - platform: template
    name: "TDS EC"
    id: tds_ec
    unit_of_measurement: "mS/cm"
    accuracy_decimals: 2
    update_interval: 2s
    lambda: |-
      float v = id(tds_raw).state;
      return 0.423 * v * v + 0.132 * v - 0.043;

  # # Placeholder for future Pressure Sensor on A1
  # - platform: ads1115
  #   ads1115_id: ads1115_outside
  #   multiplexer: 'A1_GND'
  #   gain: 1.096
  #   name: "Tank Pressure Sensor (Placeholder)"
  #   id: pressure_placeholder
  #   update_interval: 2s
  #   accuracy_decimals: 3
  #   unit_of_measurement: "V"
  #   disabled_by_default: true
  
  # Stores the last successful manual fill amount for use in dosing
  - platform: template
    name: "Last Fill Gallons"
    id: last_fill_gal
    unit_of_measurement: "gal"
    accuracy_decimals: 2
    update_interval: never  # Only updated when fill completes
    force_update: true
    internal: false
    lambda: |-
      return id(last_fill_gallons_ESP);  // Global variable holding last fill amount

  # Records the fill time duration
  - platform: template
    name: "Fill Duration Min"
    id: fill_duration_min
    unit_of_measurement: "min"
    accuracy_decimals: 2
    update_interval: never
    force_update: true
    internal: false
    lambda: |-
      return NAN;  // Value is pushed via publish_state()


  # Revised block 25-08-03
  # Consistent IDs match global variables: no confusion when tracing values.
  # You now see what actually ran: dose and duration, both accurate and logged in HA.
  # force_update: true on the dose sensors ensures HA gets the updated value even if it matches the previous dose.
  # ⏱ Pump A runtime sensor (published when pump turns OFF)
  - platform: template
    name: "Pump A Runtime"
    id: pump_a_runtime
    unit_of_measurement: "s"
    accuracy_decimals: 2
    update_interval: never
    lambda: |-
      return id(pump_a_runtime_ESP);

  # 🧴 Dose A sensor (published when pump A starts)
  - platform: template
    name: "dose_a_ml"
    id: dose_a_ml
    unit_of_measurement: "mL"
    accuracy_decimals: 2
    update_interval: never
    force_update: true
    lambda: |-
      return id(dose_a_ml_ESP);

  # ⏱ Pump B runtime sensor (published when pump turns OFF)
  - platform: template
    name: "Pump B Runtime"
    id: pump_b_runtime
    unit_of_measurement: "s"
    accuracy_decimals: 2
    update_interval: never
    lambda: |-
      return id(pump_b_runtime_ESP);

  # 🧴 Dose B sensor (published when pump B starts)
  - platform: template
    name: "dose_b_ml"
    id: dose_b_ml
    unit_of_measurement: "mL"
    accuracy_decimals: 2
    update_interval: never
    force_update: true
    lambda: |-
      return id(dose_b_ml_ESP);



# Added for manual overrides when needed 25-07-28
text_sensor:
  - platform: homeassistant
    name: "Hydroponics Control Mode"
    id: hydroponics_control_mode
    entity_id: input_select.hydroponics_outside_control_mode

output:
  - platform: gpio
    id: gpio_nutrient_pump_a
    pin:
      number: GPIO32
      mode: OUTPUT
#    inverted: true  # Active LOW relay

  - platform: gpio
    id: gpio_nutrient_pump_b
    pin:
      number: GPIO33
      mode: OUTPUT
#    inverted: true  # Active LOW relay

  - platform: gpio
    id: gpio_water_fill_solenoid
    pin:
      number: GPIO14
      mode: OUTPUT
#    inverted: true  # Active LOW relay

# Old ID	New ID 25-08-03
# last_pump_a_runtime	pump_a_runtime_sensor
# last_pump_b_runtime	pump_b_runtime_sensor
# last_dose_a_ml	dose_a_ml
# last_dose_b_ml	dose_b_ml

switch:
  - platform: output
    id: nutrient_pump_a
    name: "Nutrient Pump A"
    output: gpio_nutrient_pump_a
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(pump_a_start_millis) = millis();
            ESP_LOGI("main", "Pump A started");
            id(dose_a_ml).publish_state(id(dose_a_ml_ESP));
        - homeassistant.service:
            service: input_datetime.set_datetime
            data:
              entity_id: input_datetime.last_outside_dose_a
              datetime: !lambda 'return id(esptime).now().strftime("%Y-%m-%dT%H:%M:%S");'
    on_turn_off:
      then:
        - lambda: |-
            float elapsed = (millis() - id(pump_a_start_millis)) / 1000.0f;
            id(pump_a_runtime).publish_state(elapsed);
            ESP_LOGI("main", "Pump A ran for %.2f seconds", elapsed);


  - platform: output
    id: nutrient_pump_b
    name: "Nutrient Pump B"
    output: gpio_nutrient_pump_b
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(pump_b_start_millis) = millis();
            ESP_LOGI("main", "Pump B started");
            id(dose_b_ml).publish_state(id(dose_b_ml_ESP));
        - homeassistant.service:
            service: input_datetime.set_datetime
            data:
              entity_id: input_datetime.last_outside_dose_b
              datetime: !lambda 'return id(esptime).now().strftime("%Y-%m-%dT%H:%M:%S");'
    on_turn_off:
      then:
        - lambda: |-
            float elapsed = (millis() - id(pump_b_start_millis)) / 1000.0f;
            id(pump_b_runtime).publish_state(elapsed);
            ESP_LOGI("main", "Pump B ran for %.2f seconds", elapsed);



  - platform: output
    id: water_fill_solenoid
    name: "Water Fill Solenoid"
    output: gpio_water_fill_solenoid
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - lambda: |-
            id(fill_start_time) = millis();
        - logger.log:
            format: "Fill start time recorded: %u ms"
            args: [id(fill_start_time)]
            tag: main
            level: INFO
        - logger.log:
            format: "Resetting pulse counter because fill valve started"
            tag: main
            level: DEBUG
        - pulse_counter.set_total_pulses:
            id: fill_pulses
            value: 0
        - globals.set:
            id: last_fill_gallons_ESP
            value: '0.0'
        - sensor.template.publish:
            id: last_fill_gal
            state: !lambda 'return 0.0;'

    on_turn_off:
      then:
        - lambda: |-
            id(last_fill_gallons_ESP) = id(fill_gallons).state;
        - sensor.template.publish:
            id: last_fill_gal
            state: !lambda 'return id(fill_gallons).state;'
        - logger.log:
            format: "Fill complete: %.2f gal"
            args: [id(last_fill_gallons_ESP)]
            tag: main
            level: INFO


number:
  # Get target fill gallons for Manual and Override modes from Home Assistant
  - platform: homeassistant
    id: manual_fill_gallons
    entity_id: input_number.outside_manual_fill_gallons

  # Minimum gallons left to initiate Auto Fill and Dosing 
  - platform: homeassistant
    id: auto_fill_threshold
    entity_id: input_number.auto_fill_threshold_gallons

  # Number when tank is considered Full
  - platform: homeassistant
    id: tank_fill_target
    entity_id: input_number.tank_full_target

  # Get ml to dose for override from Home Assistant A
  - platform: homeassistant
    id: manual_dose_a_ml
    entity_id: input_number.manual_dose_outside_a_ml

  # Get ml to dose for override from Home Assistant B 
  - platform: homeassistant
    id: manual_dose_b_ml
    entity_id: input_number.manual_dose_outside_b_ml

  # Dosing rate: Nutrient Pump A
  - platform: template
    name: "Pump A Rate"
    id: ml_per_sec_a
    min_value: 1.0
    max_value: 5.0
    step: 0.01
    initial_value: 1.64
    unit_of_measurement: "mL/s"
    optimistic: true
    restore_value: true
    mode: box

  - platform: template
    name: "Pump B Rate"
    id: ml_per_sec_b
    min_value: 1.0
    max_value: 5.0
    step: 0.01
    initial_value: 1.66
    unit_of_measurement: "mL/s"
    optimistic: true
    restore_value: true
    mode: box

# button:
#   - platform: template
#     name: "Start Manual Fill"
#     id: manual_fill_start
#     on_press:
#       then:
#         - logger.log:
#             format: Turning on fill valve for manual fill
#             tag: main
#             level: DEBUG
#         - switch.turn_on: 
