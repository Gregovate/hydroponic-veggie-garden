# Changed button function to allow for auto-fill 25-08-02 and removed full tank in line 573 25-08-04
button:
  - platform: template
    name: "Start Manual Fill"
    id: start_manual_fill
    on_press:
      then:
        - lambda: |-
            if (id(hydroponics_control_mode).state == "Auto") {
              ESP_LOGI("auto_fill", "Auto mode: using pre-set target of %.2f gal", id(manual_fill_gallons).state);
            }


            // Capture start time
            id(fill_start_time) = millis();

            // Turn on the solenoid
            id(water_fill_solenoid).turn_on();

            // Mark state as running
            id(fill_state) = 1;

            ESP_LOGI("manual_fill", "Fill started: target = %.2f gal", id(manual_fill_gallons));


  # Reusable button that chooses dosing logic based on control mode — updated 25-07-28
  # 🧴 Button to trigger Pump A dosing updated 25-08-03
  # Calls either ESP override logic or normal dosing logic based on selected mode
  # Timestamp is now handled by the switch: on_turn_on to ensure accuracy
  - platform: template
    name: Dose Pump A
    id: dose_pump_a_button
    on_press:
      - lambda: |-
          std::string mode = id(hydroponics_control_mode).state;
          if (mode == "ESP-Override") {
            id(dose_override_pump_a).execute();  // Manual override logic
          } else {
            id(dose_pump_a).execute();           // Normal automatic dosing logic
          }

  # 🧴 Button to trigger Pump B dosing
  # Same structure as Pump A — uses selected mode to determine logic path
  # Timestamps and sensor updates now occur only when switch physically turns on
  - platform: template
    name: Dose Pump B
    id: dose_pump_b_button
    on_press:
      - lambda: |-
          std::string mode = id(hydroponics_control_mode).state;
          if (mode == "ESP-Override") {
            id(dose_override_pump_b).execute();  // Manual override logic
          } else {
            id(dose_pump_b).execute();           // Normal automatic dosing logic
          }



# Closes the valve after requested number of gallons has been added.
# And saves the gallons filled to id(last_fill_gallons)
# updated to capture filled gallons before commanding the valve to close 25-07-29
# updated fill duration to count the time while filling 25-07-29
# FILL LOGIC + NON-BLOCKING DOSING OVERRIDES
interval:
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();  // Capture current time in ms

          // ╔═══════════════════════════════╗
          // ║    FILL TRACKING LOGIC        ║
          // ╚═══════════════════════════════╝
          if (id(water_fill_solenoid).state) {
            id(fill_state) = 1;  // Mark state as RUNNING
            float duration_min = (now - id(fill_start_time)) / 60000.0;
            id(fill_duration_min).publish_state(duration_min);
            ESP_LOGD("manual_fill", "Fill running: %.2f gal so far, %.2f min",
                     id(fill_gallons).state, duration_min);
          }

          float current = id(fill_gallons).state;
          float target = id(manual_fill_gallons).state;

          if (current >= target && id(water_fill_solenoid).state) {
            id(last_fill_gallons_ESP) = current;
            id(last_fill_gal).publish_state(current);

            float duration_min = (now - id(fill_start_time)) / 60000.0;
            id(fill_duration_min).publish_state(duration_min);

            id(water_fill_solenoid).turn_off();
            id(fill_state) = 2;  // COMPLETE
            ESP_LOGI("manual_fill", "Fill complete: %.2f gal in %.2f min", current, duration_min);
          }

          // ╔════════════════════════════════════════╗
          // ║    PUMP A RUNTIME TRACKING             ║
          // ╚════════════════════════════════════════╝
          if (id(pump_a_running)) {
            float elapsed = (now - id(pump_a_start_millis)) / 1000.0f;
            id(pump_a_runtime).publish_state(elapsed);
            if (elapsed >= id(pump_a_runtime_ESP)) {
              id(nutrient_pump_a).turn_off();
              id(pump_a_running) = false;
              id(dwell_timer) = millis() + 5000;  // ⏱ set future timestamp for dwell
              id(pump_b_waiting) = true;
              id(dose_a_ml).publish_state(id(dose_a_ml_ESP));
              ESP_LOGI("main", "Auto Dosing A complete — pump off, dwell timer started");
            }
          }

          // ╔════════════════════════════════════════╗
          // ║    PUMP B START AFTER DWELL            ║
          // ╚════════════════════════════════════════╝
          if (id(pump_b_waiting) && now >= id(dwell_timer)) {
            id(pump_b_waiting) = false;

            if (id(pump_b_runtime_ESP) > 0.0f) {
              id(pump_b_start_millis) = now;
              id(pump_b_runtime).publish_state(0.0f);
              id(pump_b_running) = true;
              id(nutrient_pump_b).turn_on();
              ESP_LOGI("main", "Dwell complete — starting Pump B");
              return;  // 🛑 Prevent early shutdown during same interval loop
            } else {
              ESP_LOGW("main", "Skipping Pump B — runtime is zero.");
            }
          }

          // ╔════════════════════════════════════════╗
          // ║    PUMP B RUNTIME TRACKING             ║
          // ╚════════════════════════════════════════╝
          if (id(pump_b_running)) {
            float elapsed = (now - id(pump_b_start_millis)) / 1000.0f;
            id(pump_b_runtime).publish_state(elapsed);
            if (elapsed >= id(pump_b_runtime_ESP)) {
              id(nutrient_pump_b).turn_off();
              id(pump_b_running) = false;
              id(pump_b_runtime_ESP) = 0.0f;
              id(dose_b_ml).publish_state(id(dose_b_ml_ESP));
              ESP_LOGI("main", "Auto Dosing B complete — pump off");
            }
          }

      # ╔══════════════════════════════════════╗
      # ║     POST-FILL LOGIC + AUTO DOSING    ║
      # ╚══════════════════════════════════════╝
      - if:
          condition:
            lambda: return id(fill_state) == 2;
          then:
            - homeassistant.service:
                service: input_datetime.set_datetime
                data:
                  entity_id: input_datetime.tank_fill_stopped
                data_template:
                  datetime: !lambda |-
                    char buf[25];
                    time_t now = id(esptime).now().timestamp;
                    strftime(buf, sizeof(buf), "%Y-%m-%dT%H:%M:%S", localtime(&now));
                    return std::string(buf);

            - homeassistant.service:
                service: input_number.set_value
                data:
                  entity_id: input_number.tank_last_fill_gallons
                data_template:
                  value: !lambda 'return id(last_fill_gallons_ESP);'

            - lambda: |-
                std::string mode = id(hydroponics_control_mode).state;
                if (mode != "ESP-Override") {
                  float gal = id(last_fill_gallons_ESP);
                  float rate_a = id(ml_per_sec_a).state;
                  float rate_b = id(ml_per_sec_b).state;

                  if (gal > 0.0 && rate_a > 0.01 && rate_b > 0.01) {
                    float dose_ml = gal * 10.0f;

                    id(dose_a_ml_ESP) = dose_ml;
                    id(dose_a_ml).publish_state(id(dose_a_ml_ESP));

                    id(dose_b_ml_ESP) = dose_ml;
                    id(dose_b_ml).publish_state(id(dose_b_ml_ESP));

                    float seconds_a = dose_ml / rate_a;
                    float seconds_b = dose_ml / rate_b;

                    id(pump_a_runtime_ESP) = seconds_a;
                    id(pump_a_start_millis) = millis();
                    id(pump_a_runtime).publish_state(0.0f);
                    id(pump_a_running) = true;
                    id(nutrient_pump_a).turn_on();

                    id(pump_b_runtime_ESP) = seconds_b;
                    id(pump_b_runtime).publish_state(0.0f);

                    ESP_LOGI("main", "Auto Dosing A: %.2f mL over %.2f sec", dose_ml, seconds_a);
                    ESP_LOGI("main", "Auto Dosing B: %.2f mL over %.2f sec", dose_ml, seconds_b);
                  } else {
                    ESP_LOGW("main", "Auto Dosing skipped — invalid flow rates or gallons");
                  }
                } else {
                  ESP_LOGI("main", "ESP-Override active — auto dosing skipped");
                }

            - lambda: |-
                id(last_fill_gallons_ESP) = 0.0;
                id(fill_state) = 0;

# NON-BLOCKING DOSING SCRIPTS
script:
  - id: dose_pump_a
    mode: single
    then:
      - lambda: |-
          float gal = id(fill_gallons).state;
          float rate = id(ml_per_sec_a).state;

          if (gal <= 0.0) {
            ESP_LOGW("main", "Dose A skipped — no gallons detected (%.2f gal)", gal);
            return;
          }

          if (rate <= 0.01) {
            ESP_LOGE("main", "Invalid flow rate for Pump A: %.2f mL/s", rate);
            return;
          }

          float ml = gal * 10.0;
          id(dose_a_ml_ESP) = ml; 
          id(dose_a_ml).publish_state(id(dose_a_ml_ESP));
          float seconds = ml / rate;

          ESP_LOGI("main", "Dose A: %.2f mL for %.2f gal (%.2f sec)", ml, gal, seconds);
          id(pump_a_runtime_ESP) = seconds;
          id(pump_a_runtime).publish_state(seconds);
          id(nutrient_pump_a).turn_on();

  - id: dose_pump_b
    mode: single
    then:
      - lambda: |-
          float gal = id(fill_gallons).state;
          float rate = id(ml_per_sec_b).state;

          if (gal <= 0.0) {
            ESP_LOGW("main", "Dose B skipped — no gallons detected (%.2f gal)", gal);
            return;
          }

