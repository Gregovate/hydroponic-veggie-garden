type: grid
title: System Controls
columns: 2
square: false
cards:
  - type: custom:button-card
    entity: input_boolean.hydroponics_outside_system
    name: Outside System
    icon: mdi:power
    show_state: true
    tap_action:
      action: toggle
    styles:
      card:
        - height: 120px
      icon:
        - width: 42px
      name:
        - font-size: 18px
      state:
        - font-size: 15px
  - type: custom:button-card
    entity: switch.plug_hydroponics_outside
    name: Power Switch
    icon: mdi:power-plug-outline
    show_state: true
    tap_action:
      action: toggle
      confirmation:
        text: This will shut off the hydroponics controller and pump. Continue?
    styles:
      card:
        - height: 120px
      icon:
        - width: 42px
      name:
        - font-size: 18px
      state:
        - font-size: 15px
  - type: custom:button-card
    entity: input_select.hydroponics_outside_control_mode
    name: Control Mode
    icon: mdi:robot
    show_state: true
    tap_action:
      action: more-info
    styles:
      card:
        - height: 120px
        - background-color: |
            [[[
              switch (entity.state) {
                case 'Auto': return '#2e7d32';
                case 'ESP-Override': return '#1565c0';
                case 'Manual': return '#ef6c00';
                default: return 'var(--ha-card-background)';
              }
            ]]]
      icon:
        - width: 34px
      name:
        - font-size: 18px
      state:
        - font-size: 22px
        - font-weight: bold
  - type: custom:button-card
    entity: input_boolean.outside_tds_auto_dose_enabled
    name: Auto Dose
    icon: mdi:robot-outline
    show_state: true
    tap_action:
      action: toggle
      confirmation:
        text: >-
          Auto dosing will allow the system to dose nutrients when TDS voltage
          is low. Continue?
    styles:
      card:
        - height: 120px
      icon:
        - width: 42px
      name:
        - font-size: 18px
      state:
        - font-size: 15px
  - type: custom:flex-horseshoe-card
    entities:
      - entity: sensor.plug_hydroponics_outside_power
        decimals: 0
        unit: W
        name: Power
      - entity: sensor.hydroponics_outside_energy_daily
        decimals: 2
        unit: kWh
        name: Today
      - entity: sensor.plug_hydroponics_outside_current
        decimals: 2
        unit: A
        name: Current
      - entity: sensor.plug_hydroponics_outside_voltage
        decimals: 0
        unit: V
        name: Voltage
    show:
      horseshoe_style: colorstop
      scale_tickmarks: true
    layout:
      states:
        - id: 0
          entity_index: 0
          xpos: 50
          ypos: 36
          styles:
            - font-size: 2.6em;
            - font-weight: bold;
        - id: 1
          entity_index: 1
          xpos: 50
          ypos: 58
          styles:
            - font-size: 1.0em;
        - id: 2
          entity_index: 2
          xpos: 25
          ypos: 74
          styles:
            - font-size: 0.9em;
        - id: 3
          entity_index: 3
          xpos: 75
          ypos: 74
          styles:
            - font-size: 0.9em;
      names:
        - id: 0
          entity_index: 0
          xpos: 50
          ypos: 90
          styles:
            - font-size: 1.1em;
    horseshoe_scale:
      min: 0
      max: 50
    color_stops:
      "0": "#43a047"
      "4": "#7cb342"
      "8": "#fbc02d"
      "20": "#fb8c00"
      "50": "#e53935"
    card_mod:
      style: |
        ha-card {
          padding-top: 10px;
        }
  - type: vertical-stack
    cards:
      - type: custom:button-card
        entity: input_boolean.calibration_mode
        name: Calibration Mode
        icon: mdi:tune-variant
        show_state: true
        tap_action:
          action: toggle
        styles:
          card:
            - height: 93px
          icon:
            - width: 34px
          name:
            - font-size: 17px
          state:
            - font-size: 14px
      - type: custom:button-card
        entity: input_button.capture_outside_tds_reference_reading
        name: Measure EC
        icon: mdi:test-tube
        show_state: false
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.popup
            data:
              title: Measure EC Reference
              content:
                type: entities
                show_header_toggle: false
                entities:
                  - entity: sensor.hydroponics_patio_esp32_tds_raw
                    name: Current Probe Voltage
                  - entity: input_number.outside_tds_meter_entry
                    name: Handheld Meter Reading
                  - entity: input_select.outside_tds_meter_units
                    name: Units
                  - entity: input_text.outside_tds_reference_note
                    name: Note
                  - entity: input_button.capture_outside_tds_reference_reading
                    name: Save Reading
        styles:
          card:
            - height: 93px
            - background-color: "#1e3a5f"
          icon:
            - width: 34px
            - color: "#81d4fa"
          name:
            - font-size: 17px
            - color: white
      - type: custom:button-card
        entity: input_button.hydro_history_create_field_note
        name: Field Note
        icon: mdi:notebook-edit
        show_state: false
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.popup
            data:
              title: Add Field Note
              content:
                type: entities
                show_header_toggle: false
                entities:
                  - entity: input_text.hydro_history_field_note
                    name: Field Note
                  - entity: input_datetime.hydro_history_field_note_date
                    name: Event Date
                  - entity: input_select.hydro_history_field_note_location
                    name: Location
                  - entity: input_button.hydro_history_create_field_note
                    name: Save Field Note
        styles:
          card:
            - height: 93px
            - background-color: "#1e3a5f"
          icon:
            - width: 34px
            - color: "#81d4fa"
          name:
            - font-size: 17px
            - color: white
