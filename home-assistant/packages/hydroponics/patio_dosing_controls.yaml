# ==============================================================================
# Package: \config\packages\hydroponics\patio_dosing_controls.yaml

# Project: Hydroponics Veggie Garden
# Author: Greg Liebig

#
# Purpose
# -------
# Provides helper entities, calculated sensors, inventory tracking, safety
# interlocks, and status sensors used by the outside hydroponic dosing system.
#
# This package does NOT perform automatic dosing.  All automations remain in
# the Home Assistant UI to preserve Automation Traces for troubleshooting.
#
# ------------------------------------------------------------------------------
# Automatic Maintenance Dosing
# ------------------------------------------------------------------------------
#
# UI Automation:
#   Outside TDS Maintenance Auto Dose
#
# Purpose:
#   Maintain minimum nutrient concentration while the outside hydroponic system
#   is circulating. This is independent of the automatic refill controller.
#
# Control Strategy:
#
#   Production Operation
#   --------------------
#   • Current production auto-dose logic uses raw TDS probe voltage.
#   • Calculates a step dose from:
#
#         Tank Volume × mL per Gallon
#
#   • Doses equal amounts of Nutrient A and Nutrient B.
#   • Waits for the configurable maintenance mixing period.
#   • Rechecks probe voltage after mixing.
#   • Applies a configurable offset before another maintenance dose may begin.
#   • Repeats until:
#       - Minimum voltage threshold is restored, OR
#       - Maximum dose cycles are reached.
#
#   Engineering & Calibration
#   -------------------------
#   • Outside Estimated EC provides a live engineering estimate of
#     reservoir EC for dashboard monitoring and comparison against
#     handheld EC reference measurements.
#   • Estimated EC is NOT currently used for automatic dosing.
#   • Each EC reference measurement stores:
#       - Estimated EC snapshot
#       - Raw probe voltage
#       - Handheld EC measurement
#       - Rainfall and estimated dilution
#   • EC model performance is tracked using the calculated EC error
#     (handheld EC − Estimated EC).
#   • Historical reference data is used to improve future Estimated
#     EC calibration models.
#
# Operating Range
# ----------------
#   Auto Dose Trigger      ≈ 1.80 V (configurable)
#   Normal Operating Band  1.80–2.00 V
#   Hard Stop              2.10 V
#   Sensor Upper Limit     ≈ 2.40 V
#
# Safety Interlocks
# -----------------
# Auto dosing is inhibited when:
#
#   • Auto Dose Enabled = OFF
#   • Calibration Mode = ON
#   • Outside System = OFF
#   • Control Mode ≠ Auto
#   • Automatic refill/dosing cycle is active
#   • Fill solenoid is active
#   • Nutrient Pump A or B is already running
#   • Mixing is not confirmed
#   • Tank volume is invalid or below minimum
#   • Nutrient inventory is below configured threshold
#   • Nutrient inventory is unknown/unavailable
#   • Step dose computes to zero
#   • Hard-stop voltage has been reached
#
# Logging
# -------
# Every maintenance dose is written by Node-RED to:
#
#     maintenance_log
#
# including:
#
#   • Timestamp
#   • Tank volume
#   • Dose A/B
#   • TDS before
#   • TDS after
#   • Operating mode
#
# This historical data will eventually be used to improve dosing efficiency.
#
# ------------------------------------------------------------------------------
# Notes
# ------------------------------------------------------------------------------
#
# • Entities/helpers live in YAML for documentation and version control.
# • Automations remain in the UI for Trace support.
# • Suggested Dose sensors are informational only.
# • Capacities come from patio_system_constants.yaml.
# • Target TDS helpers are defined in patio_system_constants.yaml.
# • Maintenance dose events are logged to maintenance_log.
# • Handheld EC reference measurements are logged to
#   hydro_tds_reference_reading for engineering analysis and
#   Estimated EC model development.
#
# Revision History
# ----------------
# 2026-07-12  GAL  Expanded the EC reference engineering workflow.
#                  Added Estimated EC snapshot storage with each
#                  handheld EC reference measurement, rainfall
#                  baseline tracking, EC model error (ec_error)
#                  analysis, and Home Assistant engineering history
#                  dashboard support. These changes establish the
#                  long-term calibration dataset for future
#                  temperature- and rainfall-compensated Estimated
#                  EC models.
# 2026-07-10  GAL  ISSUE-005: Added configurable maintenance debounce,
#                  mixing time, and next-dose offset helpers. These helpers
#                  centralize operator-adjustable timing values; active
#                  automations and Node-RED will be updated separately.
# 2026-07-03  GAL  Added rainfall/dilution context to EC reference workflow.
#                  Rain total, rain since last EC reference, and estimated
#                  rainwater added are now stored with handheld EC readings.
#                  Live Estimated EC remains voltage-only in model v0.1.
# 2026-07-02  GAL  Added Outside Estimated EC sensor derived from the
#                  installed TDS probe voltage for comparison against
#                  handheld EC reference measurements. Production
#                  auto-dose continues to use raw probe voltage until
#                  the Estimated EC model has been sufficiently
#                  validated with field data.
# 2025-08-01  GAL  Initial dosing monitor package.
# 2025-08-18  GAL  Inventory tracking and suggested dosing.
# 2026-06-27  GAL  Added automatic maintenance dosing architecture,
#                  Node-RED maintenance logging, safety interlocks,
#                  and volume-based step dosing documentation.
# ==============================================================================

template:
  - sensor:
      # ─────────────────────────────────────────────────────────
      # Status:
      # - Experimental engineering sensor.
      # - NOT currently used for automatic dosing decisions.
      # - Handheld EC measurements remain the calibration authority.
      #
      # Estimation Model:
      # Version: 0.1 (Initial Voltage-Only Field Calibration)
      #
      #   estimated_ec = (2.1632 × probe_voltage) - 2.4984
      #
      # Model Performance 26-07-06:
      # - Version 0.1 is c-urrently biased low against recent handheld EC readings.
      # - Estimated EC is being stored with each EC reference reading so model
      #   error can be reviewed directly from the database and dashboard.
      # - Do not revise the live formula until more post-ADS1115-3.3V data is collected.
      #
      # Mixing Delay
      #
      # Fixed at 10 minutes.
      #
      # Justification:
      # - Tank capacity: 25 gallons maximum.
      # - Circulation: approximately 10.5 L/min (≈2.8 gal/min).
      # - Even with a completely full tank, 10 minutes provides
      #   more than one complete tank turnover before the next
      #   EC measurement and dose evaluation.
      #
      # Field Calibration Data:
      # - 2026-06-27  EC ≈ 2.0
      # - 2026-07-01  EC = 1.7
      # - 2026-07-02  EC = 1.5 after estimated 0.442 gal rain dilution
      # - 2026-07-02  EC = 1.9 after manual 50 mL Part A + 50 mL Part B correction
      # - 2026-07-03  EC = 1.8 after estimated 0.342 gal overnight rain dilution
      #
      # Rainfall / Dilution Context:
      # - Rainfall is now recorded with EC reference readings.
      # - Rainfall is NOT yet part of this live Estimated EC formula.
      # - Rainfall data will be used to improve future model versions.
      #
      # Future Work:
      # - Incorporate water temperature compensation.
      # - Incorporate rainfall dilution context.
      # - Improve the estimation model using additional handheld EC
      #   reference measurements collected over time.
      # - Replace voltage-based automatic dosing with Estimated EC
      #   after sufficient validation.
      # ─────────────────────────────────────────────────────────
      - name: "Outside Estimated EC"
        unique_id: outside_estimated_ec
        unit_of_measurement: "mS/cm"
        icon: mdi:chart-bell-curve
        state: >
          {% set v = states('sensor.hydroponics_patio_esp32_tds_raw') %}
          {% if v in ['unknown', 'unavailable', 'none', ''] %}
            unknown
          {% else %}
            {% set voltage = v | float(0) %}
            {% set ec = (2.1632 * voltage) - 2.4984 %}
            {{ [ec, 0] | max | round(2) }}
          {% endif %}

      - name: "Outside Remaining Nutrient A (mL)"
        unique_id: outside_remaining_nutrient_a_ml
        unit_of_measurement: "mL"
        icon: mdi:flask
        state: >
          {% set start = states('input_number.last_batch_start_level_a') | float(0) %}
          {% set used  = states('input_number.outside_total_dose_a_ml') | float(0) %}
          {{ [start - used, 0] | max | round(1) }}

      - name: "Outside Remaining Nutrient B (mL)"
        unique_id: outside_remaining_nutrient_b_ml
        unit_of_measurement: "mL"
        icon: mdi:flask
        state: >
          {% set start = states('input_number.last_batch_start_level_b') | float(0) %}
          {% set used  = states('input_number.outside_total_dose_b_ml') | float(0) %}
          {{ [start - used, 0] | max | round(1) }}

      - name: "Outside Remaining Nutrient A (%)"
        unique_id: outside_remaining_nutrient_a_pct
        unit_of_measurement: "%"
        icon: mdi:percent
        state: >
          {% set start = states('input_number.last_batch_start_level_a') | float(0) %}
          {% set rem   = states('sensor.outside_remaining_nutrient_a_ml') | float(0) %}
          {{ (100 * rem / start) | round(1) if start > 0 else 0 }}

      - name: "Outside Remaining Nutrient B (%)"
        unique_id: outside_remaining_nutrient_b_pct
        unit_of_measurement: "%"
        icon: mdi:percent
        state: >
          {% set start = states('input_number.last_batch_start_level_b') | float(0) %}
          {% set rem   = states('sensor.outside_remaining_nutrient_b_ml') | float(0) %}
          {{ (100 * rem / start) | round(1) if start > 0 else 0 }}

      # 📊 Suggested Total Dose (based on current EC/TDS gap) — informational only
      - name: "Suggested Total Dose (mL)"
        unique_id: suggested_total_dose
        unit_of_measurement: "mL"
        icon: mdi:beaker
        state: >
          {% set tds_now = states('sensor.hydroponics_patio_esp32_tds_raw') | float(0) %}
          {% set target  = states('input_number.target_tds') | float(2000) %}
          {% set gallons = states('sensor.outside_tank_gallons') | float(0) %}
          {% set factor  = states('input_number.tds_dosing_factor') | float(0.01) %}
          {% set ml = (target - tds_now) * gallons * factor %}
          {{ [ml, 0] | max | round(0) | int }}

      # 📦 Suggested Dose A — informational only (half of total)
      - name: "Suggested Dose A (mL)"
        unique_id: suggested_dose_a_ml
        unit_of_measurement: "mL"
        icon: mdi:alpha-a-circle-outline
        state: >
          {% set ml = states('sensor.suggested_total_dose_ml') | float(0) %}
          {{ (ml / 2) | round(0) | int }}

      # 📦 Suggested Dose B — informational only (half of total)
      - name: "Suggested Dose B (mL)"
        unique_id: suggested_dose_b_ml
        unit_of_measurement: "mL"
        icon: mdi:alpha-b-circle-outline
        state: >
          {% set ml = states('sensor.suggested_total_dose_ml') | float(0) %}
          {{ (ml / 2) | round(0) | int }}

      # Clean text status (never "Unavailable")
      # Text summary based on input_number.min_tds / max_tds
      - name: "TDS Status"
        unique_id: tds_status
        icon: mdi:check-circle-outline
        state: >-
          {% set s = states('sensor.hydroponics_patio_esp32_tds_raw') %}
          {% set minv = (states('input_number.min_tds') | float(3)) / 1000 %}
          {% set maxv = (states('input_number.max_tds') | float(3)) / 1000 %}
          {% if s in ['unknown','unavailable',''] %}
            ❓ Unknown
          {% else %}
            {% set v = s | float(0) %}
            {% if v < minv %}
              ⚠️ Too Low
            {% elif v > maxv %}
              ⚠️ Too High
            {% else %}
              ✅ OK
            {% endif %}
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Auto Dose Step Amount
      #
      # Purpose:
      # - Calculates the next maintenance dose request amount.
      # - Uses proportional step dosing based on raw TDS voltage.
      # - HA calculates requested mL.
      # - patio_controller only executes the requested amount.
      # ─────────────────────────────────────────────────────────
      - name: "Outside Auto Dose Step Amount"
        unique_id: outside_auto_dose_step_amount
        unit_of_measurement: "mL"
        icon: mdi:beaker-plus-outline
        state: >
          {% set gal = states('sensor.outside_tank_gallons') | float(0) %}
          {% set mlpg = states('input_number.outside_auto_dose_ml_per_gallon') | float(0) %}
          {% set v = states('sensor.hydroponics_patio_esp32_tds_raw') | float(0) %}
          {% set low = states('input_number.outside_tds_auto_dose_low_voltage') | float(1.80) %}
          {% set target = states('input_number.outside_tds_auto_dose_target_voltage') | float(2.00) %}

          {% if gal <= 0 or mlpg <= 0 or target <= low or v >= target %}
            0
          {% else %}
            {% set max_step_ml = gal * mlpg %}
            {% set ratio = (target - v) / (target - low) %}
            {% set ratio = [ratio, 1] | min %}
            {% set ratio = [ratio, 0] | max %}
            {{ (max_step_ml * ratio) | round(1) }}
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Auto Dose Status
      #
      # Purpose:
      # - Human-readable dashboard status for maintenance dosing.
      # - Does not control dosing directly.
      # - Explains why auto-dosing is ready, needed, blocked,
      #   locked out, or waiting.
      # ─────────────────────────────────────────────────────────
      - name: "Outside Auto Dose Status"
        unique_id: outside_auto_dose_status
        icon: mdi:robot-outline
        state: >
          {% set tds = states('sensor.hydroponics_patio_esp32_tds_raw') %}
          {% set gal = states('sensor.outside_tank_gallons') %}
          {% set a_ml = states('sensor.outside_remaining_nutrient_a_ml') %}
          {% set b_ml = states('sensor.outside_remaining_nutrient_b_ml') %}
          {% set mlpg = states('input_number.outside_auto_dose_ml_per_gallon') | float(0) %}
          {% set step_ml = states('sensor.outside_auto_dose_step_amount') | float(0) %}
          {% set low = states('input_number.outside_tds_auto_dose_low_voltage') | float(1.80) %}
          {% set target = states('input_number.outside_tds_auto_dose_target_voltage') | float(2.00) %}
          {% set hard_stop = states('input_number.outside_tds_auto_dose_hard_stop_voltage') | float(2.10) %}

          {% if is_state('input_boolean.outside_tds_auto_dose_enabled', 'off') %}
            Disabled
          {% elif is_state('input_boolean.calibration_mode', 'on') %}
            Calibration Mode
          {% elif tds in ['unknown', 'unavailable', 'none', ''] %}
            TDS Unknown
          {% elif gal in ['unknown', 'unavailable', 'none', ''] %}
            Tank Unknown
          {% elif gal | float(0) <= 5 %}
            Tank Too Low
          {% elif mlpg <= 0 %}
            Step Dose Not Set
          {% elif target <= low %}
            Voltage Setup Error
          {% elif is_state('binary_sensor.mixing_confirmed', 'off') %}
            Mixing Not Confirmed
          {% elif is_state('binary_sensor.outside_nutrient_inventory_low', 'on') %}
            Inventory Low
          {% elif a_ml in ['unknown', 'unavailable', 'none', ''] %}
            Nutrient A Unknown
          {% elif b_ml in ['unknown', 'unavailable', 'none', ''] %}
            Nutrient B Unknown
          {% elif tds | float(9) >= hard_stop %}
            Hard Stop
          {% elif tds | float(0) < low and step_ml <= 0 %}
            Step Dose Error
          {% elif tds | float(0) < low %}
            Dose Needed
          {% elif tds | float(0) >= target %}
            Ready
          {% else %}
            Waiting
          {% endif %}

  - binary_sensor:
      # ON if raw < min_tds; otherwise OFF (never 'Unavailable')
      - name: "⚠️ Low TDS Warning"
        unique_id: tds_too_low_sensor_warning
        device_class: problem
        state: >-
          {% set s = states('sensor.hydroponics_patio_esp32_tds_raw') %}
          {% if s in ['unknown','unavailable',''] %}
            false
          {% else %}
            {{ (s | float(3)) < (states('input_number.min_tds') | float(3)) / 1000 }}
          {% endif %}

      # ON if raw > max_tds; otherwise OFF (never 'Unavailable')
      - name: "⚠️ High TDS Safety"
        unique_id: tds_too_high_sensor_safety
        device_class: problem
        state: >-
          {% set s = states('sensor.hydroponics_patio_esp32_tds_raw') %}
          {% if s in ['unknown','unavailable',''] %}
            false
          {% else %}
            {{ (s | float(3)) > (states('input_number.max_tds') | float(3)) / 1000 }}
          {% endif %}

      # 🌀 Mixing Confirmed
      # Indicates that nutrient solution is actively circulating.
      # Tank volume is checked separately by the auto-dose safety logic,
      # so this sensor only verifies circulation flow.
      - name: "Mixing Confirmed"
        unique_id: mixing_confirmed
        device_class: running
        state: >
          {% set flow_east = states('sensor.hydroponics_patio_esp32_east_channel_flow') | float(0) %}
          {% set flow_west = states('sensor.hydroponics_patio_esp32_west_channel_flow') | float(0) %}
          {{ flow_east > 1 and flow_west > 1 }}

      # ─────────────────────────────────────────────────────────
      # Nutrient Inventory Low
      #
      # ON blocks automatic maintenance dosing.
      #
      # Uses the nutrient inventory percentage sensors:
      # - sensor.outside_remaining_nutrient_a
      # - sensor.outside_remaining_nutrient_b
      #
      # Although these entities report percentages, their entity
      # IDs do not include "_pct". The "_ml" entities represent
      # remaining nutrient volume and are not used by this lockout.
      #
      # Unknown or unavailable inventory is treated as low so
      # automatic maintenance dosing fails safe.
      # ─────────────────────────────────────────────────────────
      - name: "Outside Nutrient Inventory Low"
        unique_id: outside_nutrient_inventory_low
        device_class: problem
        state: >
          {% set a = states('sensor.outside_remaining_nutrient_a') %}
          {% set b = states('sensor.outside_remaining_nutrient_b') %}
          {% set limit =
            states('input_number.outside_auto_dose_inventory_low_pct')
              | float(20)
          %}
          {% if a in ['unknown', 'unavailable', 'none', ''] or
                b in ['unknown', 'unavailable', 'none', ''] %}
            true
          {% else %}
            {{ a | float(0) < limit or b | float(0) < limit }}
          {% endif %}
      # Outside Auto Dose Allowed
      # Master safety gate for maintenance auto-dosing.
      #
      # Must be TRUE before automation can dose.
      #
      # Blocks dosing when:
      # - Calibration mode is active
      # - Outside system is not circulating
      # - Tank volume is invalid/too low
      # - Nutrient inventory is low
      # - Nutrient mL remaining is unknown
      # - Step dose exceeds remaining A or B
      # - TDS voltage is already at/above hard stop
      # ─────────────────────────────────────────────────────────
      - name: "Outside Auto Dose Allowed"
        unique_id: outside_auto_dose_allowed
        icon: mdi:shield-check
        state: >
          {% set tds = states('sensor.hydroponics_patio_esp32_tds_raw') %}
          {% set gal = states('sensor.outside_tank_gallons') %}
          {% set a_ml = states('sensor.outside_remaining_nutrient_a_ml') %}
          {% set b_ml = states('sensor.outside_remaining_nutrient_b_ml') %}
          {% set step_ml = states('sensor.outside_auto_dose_step_amount') | float(0) %}
          {% set hard_stop = states('input_number.outside_tds_auto_dose_hard_stop_voltage') | float(2.10) %}
          {% if tds in ['unknown', 'unavailable', 'none', ''] %}
            false
          {% elif gal in ['unknown', 'unavailable', 'none', ''] %}
            false
          {% elif a_ml in ['unknown', 'unavailable', 'none', ''] or b_ml in ['unknown', 'unavailable', 'none', ''] %}
            false
          {% else %}
            {{
              is_state('input_boolean.outside_tds_auto_dose_enabled', 'on')
              and is_state('input_boolean.calibration_mode', 'off')
              and is_state('binary_sensor.mixing_confirmed', 'on')
              and is_state('binary_sensor.outside_nutrient_inventory_low', 'off')
              and gal | float(0) > 5
              and step_ml > 0
              and a_ml | float(0) >= step_ml
              and b_ml | float(0) >= step_ml
              and tds | float(9) < hard_stop
            }}
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Outside Maintenance Dose Due
      #
      # GAL 2026-07-10 ISSUE-006
      #
      # Purpose:
      # - Provides the debounced trigger for the Outside TDS
      #   Maintenance Auto Dose UI automation.
      # - Turns ON only after all required maintenance-dose
      #   conditions remain continuously valid for five minutes.
      # - Allows the timer to begin when Auto Dose is enabled while
      #   the TDS voltage is already below the low threshold.
      #
      # This entity does not operate the nutrient pumps.
      # The UI automation writes the A/B request helpers and presses
      # the ESPHome-owned maintenance dose request button.
      # ─────────────────────────────────────────────────────────
      - name: "Outside Maintenance Dose Due"
        unique_id: outside_maintenance_dose_due
        icon: mdi:flask-plus-outline

        availability: >-
          {{
            states('sensor.hydroponics_patio_esp32_tds_raw')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('input_number.outside_tds_auto_dose_low_voltage')
              not in ['unknown', 'unavailable', 'none', '']
          }}

        state: >-
          {% set raw_voltage =
            states('sensor.hydroponics_patio_esp32_tds_raw') | float(0)
          %}
          {% set low_voltage =
            states('input_number.outside_tds_auto_dose_low_voltage') | float(0)
          %}

          {{
            is_state(
              'input_boolean.outside_tds_auto_dose_enabled',
              'on'
            )
            and
            is_state(
              'binary_sensor.outside_auto_dose_allowed',
              'on'
            )
            and
            is_state(
              'input_select.hydroponics_outside_control_mode',
              'Auto Fill - Auto Dose'
            )
            and
            is_state(
              'switch.hydroponics_patio_esp32_water_fill_solenoid',
              'off'
            )
            and
            is_state(
              'switch.hydroponics_patio_esp32_nutrient_pump_a',
              'off'
            )
            and
            is_state(
              'switch.hydroponics_patio_esp32_nutrient_pump_b',
              'off'
            )
            and
            raw_voltage < low_voltage
          }}

        # GAL 2026-07-13 ISSUE-005:
        # Temporarily restored to the proven fixed five-minute debounce
        # while the configurable implementation is redesigned safely.
        delay_on:
          minutes: 5

# ───────────────────────────────────────────────────────────────────────────────
# Input Boolean Helpers
# ───────────────────────────────────────────────────────────────────────────────
input_boolean:
  # ───────────────────────────────────────────────────────────────────────────────
  # 🤖 Outside TDS Maintenance Auto-Dose Enable
  # Purpose:
  # - Master operator enable/disable for maintenance auto-dosing.
  # - Automation must be OFF-safe unless this helper is ON.
  # - This does not dose by itself; it only allows the UI automation to run.
  # - Safety checks still block dosing for calibration mode, low inventory,
  #   invalid tank volume, no circulation, or high TDS voltage.
  # ───────────────────────────────────────────────────────────────────────────────
  outside_tds_auto_dose_enabled:
    name: Outside TDS Auto Dose Enabled
    icon: mdi:robot-outline

  # ─────────────────────────────────────────────────────────
  # GAL 2026-07-07 ISSUE-006
  # Auto-Dose Advanced Settings Display
  # Purpose:
  # - Controls visibility of Auto-Dose settings/debug entities only.
  # - Avoids using the global calibration mode just to view this card.
  # - Does not affect dosing logic.
  # ─────────────────────────────────────────────────────────
  outside_auto_dose_show_settings:
    name: Outside Auto-Dose Show Settings
    icon: mdi:tune-variant

# ───────────────────────────────────────────────────────────────────────────────
# 📦 Outside Dosing Totals (Helpers)
# Purpose: cumulative mL since last batch — OUTSIDE scope only.
# Incremented by UI automations when a valid last_dose value arrives.
# YAML helpers do not support unique_id (expected).
# Seeded from reconciliation since 2025-08-06 (FILL + DOSE): 573.36 mL each.
# ───────────────────────────────────────────────────────────────────────────────
input_number:
  # ─────────────────────────────────────────────────────────────
  # Running totals since last batch (incremented by UI automations)
  # Seeded from reconciliation since 2025-08-06 (see maintenance log).
  # <-- 573.36 from your log; remove/change later if desired
  # ─────────────────────────────────────────────────────────────
  outside_total_dose_a_ml:
    name: Outside Total Dose A (mL)
    unit_of_measurement: "mL"
    icon: mdi:counter
    min: 0
    max: 100000
    step: 0.1
    mode: box

  outside_total_dose_b_ml:
    name: Outside Total Dose B (mL)
    unit_of_measurement: "mL"
    icon: mdi:counter
    min: 0
    max: 100000
    step: 0.1
    mode: box

  # ─────────────────────────────────────────────────────────────
  # TDS Maintenance Auto-Dosing Controls
  # Purpose:
  # - Maintains minimum TDS during normal circulation.
  # - Uses raw calibrated TDS voltage, not ppm estimator math.
  # - Automation/script remains in UI for traces.
  # - These helpers only define limits and dose sizing.
  #
  # Control concept:
  # - Dose below outside_tds_auto_dose_low_voltage.
  # - Dose A and B equally.
  # - Dose amount scales by current tank gallons.
  # - Wait for the configured mixing time before evaluating TDS-after.
  # - Apply the configured next-dose offset before another cycle may begin.
  # - Never dose at/above outside_tds_auto_dose_hard_stop_voltage.
  # ─────────────────────────────────────────────────────────────
  outside_tds_auto_dose_low_voltage:
