  # ─────────────────────────────────────────────────────────────
  # Maintenance Timing Controls
  #
  # GAL 2026-07-10 ISSUE-005
  #
  # Purpose:
  # - Centralizes operator-adjustable timing values used by routine
  #   maintenance auto-dosing.
  # - Keeps timing values visible in the Auto-Dose Settings card.
  # - Prevents the same operating value from being independently
  #   hard-coded in Home Assistant and Node-RED.
  #
  # Implementation Status:
  # - Helpers are defined here first as the single configuration source.
  # - Existing automations and Node-RED timing will be migrated separately
  #   and validated one change at a time.
  # ─────────────────────────────────────────────────────────────

  # Low TDS must remain continuously valid for this period before
  # the first automatic maintenance dose is allowed to begin.
  outside_maintenance_debounce_minutes:
    name: Outside Maintenance Debounce
    unit_of_measurement: "min"
    icon: mdi:timer-sand
    min: 0
    max: 30
    step: 1
    initial: 5
    mode: box

  # Circulation time allowed after nutrient dosing before Node-RED
  # captures TDS-after and finalizes the completed-cycle notification.
  # This may be adjusted if tank volume or circulation flow changes.
  outside_maintenance_mixing_minutes:
    name: Outside Maintenance Mixing Time
    unit_of_measurement: "min"
    icon: mdi:rotate-3d-variant
    min: 1
    max: 30
    step: 1
    initial: 10
    mode: box

  # Additional lockout after the mixing period completes. Another
  # automatic maintenance dose may not begin until this offset expires.
  outside_maintenance_next_dose_offset_seconds:
    name: Outside Maintenance Next Dose Offset
    unit_of_measurement: "s"
    icon: mdi:timer-lock-outline
    min: 0
    max: 600
    step: 10
    initial: 60
    mode: box

  # ─────────────────────────────────────────────────────────────
  # EC / TDS Reference Reading Entry
  #
  # Purpose:
  # - Manual handheld meter reading entered by the operator.
  # - Entity ID is retained for production compatibility with
  #   Node-RED flows, dashboards, and history workflows.
  # - Measurement scale is stored separately by
  #   input_select.outside_tds_meter_units.
  # - The Bluelab Truncheon is read from the flashing indicator scale.
  # - EC readings are entered to one decimal place.
  # - If two indicators flash, enter the midpoint between them.
  # ─────────────────────────────────────────────────────────────
  outside_tds_meter_entry:
    name: Outside Meter Reading
    icon: mdi:meter-electric-outline
    min: 0
    max: 5
    step: 0.1
    mode: box

  # ─────────────────────────────────────────────────────────────
  # Rain Total at Last EC Reference
  #
  # Purpose:
  # - Stores the cumulative rainfall total at the time of the
  #   most recent successful EC reference measurement.
  # - Used by the EC Reference workflow to determine rainfall
  #   that occurred since the previous handheld measurement.
  #
  # Used By:
  # - Node-RED Flow-2: TDS / EC Reference
  #
  # Workflow:
  # - Read current cumulative rainfall.
  # - Compare against this stored baseline.
  # - Calculate rainfall since the previous EC reference.
  # - Estimate rainwater dilution using tank dimensions and
  #   the configured rain capture factor.
  # - Store the calculated values in
  #   hydro_tds_reference_reading.
  # - Update this helper only after the database INSERT
  #   completes successfully.
  #
  # Notes:
  # - Represents a cumulative rainfall baseline, not rainfall
  #   for an individual event.
  # - Prevents cumulative rainfall from being counted more than
  #   once across successive EC reference measurements.
  # ─────────────────────────────────────────────────────────────
  outside_rain_total_at_last_ec_reference:
    name: Outside Rain Total at Last EC Reference
    icon: mdi:weather-rainy
    min: 0
    max: 500
    step: 0.001
    unit_of_measurement: "in"
    mode: box

  # ─────────────────────────────────────────────────────────────
  # Maintenance Dose Request Amounts
  #
  # Purpose:
  # - HA writes these values before requesting a maintenance dose.
  # - patio_controller reads these values and decides whether it is
  #   allowed to run the physical dose pumps.
  # - These do NOT directly operate pumps.
  # - Maintenance dosing must never switch Outside Control Mode.
  # ─────────────────────────────────────────────────────────────
  outside_maintenance_dose_request_a_ml:
    name: Outside Maintenance Dose Request A
    unit_of_measurement: "mL"
    icon: mdi:alpha-a-circle-outline
    min: 0
    max: 500
    step: 0.1
    mode: box

  outside_maintenance_dose_request_b_ml:
    name: Outside Maintenance Dose Request B
    unit_of_measurement: "mL"
    icon: mdi:alpha-b-circle-outline
    min: 0
    max: 500
    step: 0.1
    mode: box

# Buttons to reset Total Dosed amount when a full bottle is installed
input_button:
  reset_outside_total_dose_a:
