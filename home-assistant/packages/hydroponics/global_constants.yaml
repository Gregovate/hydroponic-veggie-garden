#==============================================================================
# Package: \config\packages\hydroponics\global_constants.yaml
#
# Project: Hydroponics Veggie Garden
# Status: Production
# Last Updated: 2026-07-01
#
# Purpose:
#   Defines shared hydroponic constants that may be used across multiple
#   hydroponic systems.
#
#   The current production system is the patio/outside system. These values are
#   currently used by that system, but this package is intended to hold defaults
#   that may also apply to future systems such as an inside/basement winter grow.
#
# Responsibilities:
#   • Shared target TDS helper
#   • Shared minimum safe TDS helper
#   • Shared maximum safe TDS helper
#   • Shared TDS dosing conversion factor
#
# Does NOT Contain:
#   • Patio-specific tank volume settings
#   • Patio-specific fill thresholds
#   • Patio-specific pump controls
#   • Patio-specific dosing controls
#   • Database connection configuration
#   • SQL write commands
#
# Notes:
#   Some values in this package may later become system-specific if the future
#   inside/basement system requires different EC/TDS targets or dosing behavior.
#   Do not rename or move these helpers during production operation unless all
#   dashboard, package, and Node-RED references have been migrated.
#
# Related Files:
#   • patio_system_constants.yaml
#   • patio_dosing_controls.yaml
#   • patio_controller.yaml
#   • docs/05-nutrient-management-and-ec-control.md
#
# Revision History:
#   2025-08-04  GAL  Initial global constants package.
#   2026-07-01  GAL  Standardized package header and documented ownership.
#==============================================================================

#------------------------------------------------------------------------------
# Input Number Helpers
#------------------------------------------------------------------------------

input_number:
  # Desired target nutrient concentration.
  # Units are currently expressed as TDS (ppm).
  target_tds:
    name: "Target TDS"
    min: 1500
    max: 2500
    step: 25
    unit_of_measurement: "ppm"
    mode: slider
    icon: mdi:target
    initial: 2000

  # Maximum safe TDS.
  # Values above this may indicate nutrient concentration is too high.
  max_tds:
    name: "Max Safe TDS"
    min: 2000
    max: 3000
    step: 25
    unit_of_measurement: "ppm"
    icon: mdi:alert
    initial: 2300

  # Minimum safe TDS.
  # Values below this may indicate insufficient nutrient concentration.
  min_tds:
    name: "Min Safe TDS"
    min: 1200
    max: 2000
    step: 25
    unit_of_measurement: "ppm"
    icon: mdi:alert
    initial: 1800

  # TDS dosing conversion factor.
  # Units: mL per ppm per gallon.
  #
  # Used by suggested dose calculations. This is a shared default and may need
  # to become system-specific if future systems use different nutrient recipes,
  # tank sizes, crops, or dosing behavior.
  tds_dosing_factor:
    name: "TDS Dosing Factor"
    min: 0.001
    max: 0.05
    step: 0.001
    unit_of_measurement: "mL/ppm·gal"
    icon: mdi:flask
    mode: box
    initial: 0.01

