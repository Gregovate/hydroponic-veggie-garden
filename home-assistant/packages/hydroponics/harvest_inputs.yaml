#==============================================================================
# Package: \config\packages\hydroponics\harvest_inputs.yaml
#
# Project: Hydroponics Veggie Garden
# Author: Greg Liebig
#
# Purpose:
#   Provides Home Assistant helper entities for future harvest logging
#   workflows.
#
# Responsibilities:
#   • Harvest location helper
#   • Harvest crop helper
#   • Harvest variety picker
#   • Harvest quantity helper
#   • Harvest weight helper
#   • Harvest note helper
#   • Harvest workflow trigger
#
# Does NOT Contain:
#   • Harvest database writes
#   • Crop or variety management
#   • Season management
#   • Planting position selection
#   • SQL sensors
#   • Node-RED workflow logic
#   • Automations
#   • Scripts
#
# Notes:
#   This package currently provides placeholder helper entities only.
#   Harvest locations, crops, varieties, and planting positions will
#   eventually be populated from the production season/planting database
#   rather than hard-coded lists.
#
# Related Files:
#   • docs/02-season-and-layout.md
#   • docs/03-harvest-and-waste-tracking.md
#   • docs/01-database-design.md
#
# Revision History
#
# 2026-07-01  GAL
#   Standardized package header and section layout.
#   Removed obsolete helper logic.
#   Documented future database-driven harvest workflow.
#
#==============================================================================

#------------------------------------------------------------------------------
# Input Select Helpers
#------------------------------------------------------------------------------

input_select:
  # Production system or growing area.
  # Future versions will be populated from the database.
  harvest_location:
    name: Harvest Location
    options:
      - patio
    icon: mdi:map-marker

  # Crop type.
  # Future versions will be populated from the active season.
  harvest_crop:
    name: Crop
    options:
      - "(select crop)"
    icon: mdi:sprout

  # Crop variety.
  # Populated dynamically after a crop is selected.
  harvest_variety_picker:
    name: Variety
    options:
      - "(select variety)"
    icon: mdi:tag

#------------------------------------------------------------------------------
# Input Text Helpers
#------------------------------------------------------------------------------

input_text:
  # Optional note recorded with the harvest entry.
  harvest_note:
    name: Harvest Note
    max: 255
    icon: mdi:note-text

#------------------------------------------------------------------------------
# Input Number Helpers
#------------------------------------------------------------------------------

input_number:
  # Count of harvested items, when count-based harvest tracking applies.
  harvest_count:
    name: Harvest Count
    min: 0
    max: 500
    step: 1
    icon: mdi:counter

  # Harvest weight in grams, when weight-based tracking applies.
  harvest_weight_g:
    name: Harvest Weight
    min: 0
    max: 20000
    step: 1
    unit_of_measurement: "g"
    icon: mdi:scale

#------------------------------------------------------------------------------
# Input Button Helpers
#------------------------------------------------------------------------------

input_button:
  # Future Node-RED trigger for harvest logging.
  log_harvest_to_db:
    name: Log Harvest
    icon: mdi:database-plus

#------------------------------------------------------------------------------
# SQL Sensors
#------------------------------------------------------------------------------
# No SQL sensors are currently defined in this package.
# Harvest database reads should be added only after the harvest workflow and
# season/planting model are finalized.