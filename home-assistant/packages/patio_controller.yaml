#==============================================================================
# Package: patio_controller.yaml
#
# Project: Hydroponics Veggie Garden
# Author: Greg Liebig
#
# Purpose:
#   Provides Home Assistant entities for the patio/outside hydroponics controller,
#   including tank volume calculation, fill prediction, controller mode, and
#   fill/dose timing helpers.
#
# Responsibilities:
#   • Tank gallons calculation from HX711 calibration helpers
#   • Filtered tank gallons sensor
#   • Tank usage / empty prediction sensors
#   • Controller mode selection
#   • Fill cycle timing helpers
#   • Dose cycle timestamp helpers
#   • Manual fill amount helper
#   • Manual dose amount helpers
#   • Auto-fill enable helper
#
# Does NOT Contain:
#   • Nutrient cost tracking
#   • Batch building history
#   • EC reference logging
#   • Database writes
#   • Node-RED workflow logic
#
# Related Files:
#   • patio_system_constants.yaml
#   • patio_dosing_controls.yaml
#   • batch_building.yaml
#   • db_history_dashboard.yaml
#
# Revision History
#
# 2026-07-05  GAL
#   Added persistent last-fill gallons helper:
#   input_number.outside_tank_last_fill_gallons.
#   Added read-only display sensors for fill/dose timestamps and
#   last-fill gallons so dashboards do not expose editable helpers.
#   ESPHome writes last-fill gallons after a completed fill so the
#   value survives ESP restarts.
#   Updated ESPHome post-fill write targets to match existing
#   outside_tank_* helper naming:
#   input_datetime.outside_tank_fill_stopped.
#
# 2026-07-01  GAL
#   Standardized package header and section layout.
#
# 2025-08-04  GAL
#   Kept system controls in this package and split dosing calculations into
#   patio_dosing_controls.yaml.
#
# 2025-07-30  GAL
#   Reviewed and renamed sensors to the current naming convention.
#
#==============================================================================

#------------------------------------------------------------------------------
# Template Sensors
#------------------------------------------------------------------------------
template:
  - sensor:
      # 📏 Gallons Calibration Sensor (From HX711 Raw Reading)
      - name: "Outside Tank Gallons"
        unique_id: outside_tank_gallons
        unit_of_measurement: "gal"
        state_class: measurement
        #device_class: volume
        state: >
          {% set raw = states('sensor.hydroponics_patio_esp32_raw_hx711_sensor') | float(999900) %}
          {% set all_points = [
            (0, states('input_number.raw_00_gallons') | float(0)),
            (5, states('input_number.raw_05_gallons') | float(0)),
            (10, states('input_number.raw_10_gallons') | float(0)),
            (15, states('input_number.raw_15_gallons') | float(0)),
            (20, states('input_number.raw_20_gallons') | float(0)),
            (25, states('input_number.raw_25_gallons') | float(0)),
          ] %}
          {% set points = all_points | rejectattr(1, 'equalto', 0) | list %}
          {% if points | length < 2 %}
            None
          {% else %}
            {% set sorted = points | sort(attribute=1) %}
            {% set g_min, r_min = sorted[0] %}
            {% set g_max, r_max = sorted[-1] %}
            {% if raw <= r_min %}
              {{ g_min }}
            {% elif raw >= r_max %}
              {{ g_max }}
            {% else %}
              {% for i in range(sorted | length - 1) %}
                {% set g1, r1 = sorted[i] %}
                {% set g2, r2 = sorted[i + 1] %}
                {% if r1 <= raw <= r2 or r2 <= raw <= r1 %}
                  {% set slope = (g2 - g1) / (r2 - r1) %}
                  {% set gallons = g1 + slope * (raw - r1) %}
                  {{ gallons | round(1) }}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endif %}

      # ⏳ Time Until Empty (Estimate)
      - name: "Time Until Empty"
        unique_id: outside_tank_time_to_empty
        unit_of_measurement: "h"
        icon: mdi:timer-sand
        state_class: measurement
        state: >
          {% set gallons = states('sensor.outside_filtered_tank_gallons') | float(0) %}
          {% set rate = states('sensor.outside_gallons_usage_rate') | float(0) %}
          {% if gallons > 0 and rate > 0 %}
            {{ (gallons / rate) | round(1) }}
          {% else %}
            {{ none }}
          {% endif %}

      # 📅 Predicted Empty Timestamp
      - name: "Outside Tank Predicted Empty"
        unique_id: outside_tank_predicted_empty
        icon: mdi:clock-alert
        device_class: timestamp
        state: >
          {% set rate = states('sensor.tank_drain_rate') | float(0) %}
          {% set gallons = states('sensor.outside_tank_gallons') | float(0) %}
          {% set last_str = states('input_datetime.last_outside_fill') %}
          {% set last_fill = strptime(last_str, '%Y-%m-%d %H:%M:%S') if last_str not in ['unknown', 'unavailable', 'none'] else none %}
          {% set elapsed = (now() - last_fill).total_seconds() if last_fill else 0 %}
          {% set target_gallons = 8.0 %}
          {% set delta_gallons = gallons - target_gallons %}

          {% if rate > 0 and delta_gallons > 0 and elapsed > 21600 %}
            {{ (now() + timedelta(hours=delta_gallons / rate)).isoformat() }}
          {% else %}
            {{ none }}
          {% endif %}

      # 🕓 Fill Duration in Minutes
      - name: "Outside Tank Last Fill Duration"
        unique_id: outside_tank_last_fill_duration
        icon: mdi:timer-outline
        unit_of_measurement: "min"
        state: >
          {% set start = states('input_datetime.outside_tank_fill_started') %}
          {% set end = states('input_datetime.outside_tank_fill_stopped') %}
          {% if start not in ['unknown', 'unavailable'] and end not in ['unknown', 'unavailable'] %}
            {% set s = strptime(start, '%Y-%m-%d %H:%M:%S') %}
            {% set e = strptime(end, '%Y-%m-%d %H:%M:%S') %}
            {{ ((e - s).total_seconds() / 60) | round(1) }}
          {% else %}
            none
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Outside Tank Last Fill Gallons Display
      # Read-only dashboard sensor backed by persistent helper:
      # input_number.outside_tank_last_fill_gallons
      # ─────────────────────────────────────────────────────────
      - name: "Outside Tank Last Fill Gallons Display"
        unique_id: outside_tank_last_fill_gallons_display
        unit_of_measurement: "gal"
        icon: mdi:water
        state: >
          {{ states('input_number.outside_tank_last_fill_gallons') | float(0) | round(2) }}

      # ─────────────────────────────────────────────────────────
      # Outside Tank Fill Started Display
      # Read-only sensor backed by fill-start helper:
      # input_datetime.outside_tank_fill_started
      # ─────────────────────────────────────────────────────────
      - name: "Outside Tank Fill Started Display"
        unique_id: outside_tank_fill_started_display
        icon: mdi:clock-start
        state: >
          {% set dt = states('input_datetime.outside_tank_fill_started') %}
          {% if dt in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ as_timestamp(dt) | timestamp_custom('%-m/%-d/%Y %-I:%M %p') }}
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Outside Tank Fill Stopped Display
      # Read-only sensor backed by fill-stop helper:
      # input_datetime.outside_tank_fill_stopped
      # ─────────────────────────────────────────────────────────
      - name: "Outside Tank Fill Stopped Display"
        unique_id: outside_tank_fill_stopped_display
        icon: mdi:clock-end
        state: >
          {% set dt = states('input_datetime.outside_tank_fill_stopped') %}
          {% if dt in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ as_timestamp(dt) | timestamp_custom('%-m/%-d/%Y %-I:%M %p') }}
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Outside Tank Last Dose A Display
      # Read-only sensor backed by helper:
      # input_datetime.last_outside_dose_a
      # ─────────────────────────────────────────────────────────
      - name: "Outside Tank Last Dose A Display"
        unique_id: outside_tank_last_dose_a_display
        icon: mdi:clock-outline
        state: >
          {% set dt = states('input_datetime.last_outside_dose_a') %}
          {% if dt in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ as_timestamp(dt) | timestamp_custom('%-m/%-d/%Y %-I:%M %p') }}
          {% endif %}

      # ─────────────────────────────────────────────────────────
      # Outside Tank Last Dose B Display
      # Read-only sensor backed by helper:
      # input_datetime.last_outside_dose_b
      # ─────────────────────────────────────────────────────────
      - name: "Outside Tank Last Dose B Display"
        unique_id: outside_tank_last_dose_b_display
        icon: mdi:clock-outline
        state: >
          {% set dt = states('input_datetime.last_outside_dose_b') %}
          {% if dt in ['unknown', 'unavailable', 'none'] %}
            unknown
          {% else %}
            {{ as_timestamp(dt) | timestamp_custom('%-m/%-d/%Y %-I:%M %p') }}
          {% endif %}

#------------------------------------------------------------------------------
# Filter / Statistics Sensors
#------------------------------------------------------------------------------
sensor:
  # 📉 Filtered Gallons Sensor (Removes minor jitter)
  - platform: filter
    name: "Outside Filtered Tank Gallons"
    unique_id: outside_filtered_tank_gallons
    entity_id: sensor.outside_tank_gallons
    filters:
      - filter: outlier
        window_size: 4
        radius: 0.3
      - filter: lowpass
        time_constant: 30
        precision: 1

  # 📊 Gallons Usage Rate (6h window)
  - platform: statistics
    name: "Patio Gallons Usage Rate"
    unique_id: patio_gallons_usage_rate
    entity_id: sensor.outside_filtered_tank_gallons
    sampling_size: 30
    max_age:
      hours: 6
    state_characteristic: mean

#------------------------------------------------------------------------------
# Input Select Helpers
#------------------------------------------------------------------------------
input_select:
  # 🔁 Control Mode Toggle (Auto/Manual)
  # Used to determine if filling/dosing should run automatically or notify user for manual intervention
  hydroponics_outside_control_mode:
    name: Hydroponics Outside Control Mode
    options:
      - Auto
      - Manual
      - ESP-Override
    initial: Auto
    icon: mdi:autorenew

#------------------------------------------------------------------------------
# Input Date/Time Helpers
#------------------------------------------------------------------------------
input_datetime:
  # 🕒 Timestamps for Last Fill Cycle
  outside_tank_fill_started:
    name: "Outside Tank Fill Started"
    has_date: true
    has_time: true

  outside_tank_fill_stopped:
    name: "Outside Tank Fill Stopped"
    has_date: true
    has_time: true

  # Time what happened (threshold crossed),
  # when it happened (stored as datetime),
  # and aligns with your intention to delay action for 30 minutes after that point.
  auto_fill_threshold_crossed_at:
    name: "Auto Fill Threshold Crossed At"
    has_date: true
    has_time: true

  # 🕒 Timestamps for Last Dosing Cycle
  last_outside_dose_a:
    name: "Last Outside Dose A"
    has_date: true
    has_time: true

  last_outside_dose_b:
    name: "Last Outside Dose B"
    has_date: true
    has_time: true

#------------------------------------------------------------------------------
# Input Number Helpers
#------------------------------------------------------------------------------
input_number:
  # Selects the number of gallons to add to the tank
  outside_manual_fill_gallons:
    name: "Outside Manual Fill Gallons"
    icon: mdi:format-color-fill
    min: 0
    max: 25
    step: 0.5
    unit_of_measurement: "gal"
    mode: slider

  # Threshold minimum gallons to trigger Auto-Fill
  # System must be in auto mode to trigger. Added: 2025-08-01
  auto_fill_threshold_gallons:
    name: "Auto Fill Threshold"
    min: 5
    max: 20
    step: 0.5
    unit_of_measurement: "gal"
    mode: slider

  tank_full_target:
    name: Tank Full Target
    min: 1
    max: 22
    step: 0.5
    unit_of_measurement: "gal"
    mode: slider
    icon: mdi:water-plus

  # # 💧 Last Fill Gallons Tracker
  # ─────────────────────────────────────────────────────────
  # Last Completed Fill Gallons
  # Stores the gallons added during the most recent completed
  # fill cycle. Intended to preserve the last fill amount for
  # dashboards and history after ESP or Home Assistant restarts.
  # ─────────────────────────────────────────────────────────
  outside_tank_last_fill_gallons:
    name: "Outside Tank Last Fill Gallons"
    min: 0
    max: 30
    step: 0.1
    unit_of_measurement: "gal"
    mode: box

  # record last volume dosed for pump A
  manual_dose_outside_a_ml:
    name: "Manual Dose Outside A ml"
    icon: mdi:test-tube
    min: 0
    max: 250
    step: 5
    unit_of_measurement: "ml"
    mode: slider
  # record last volume dosed for pump B

  manual_dose_outside_b_ml:
    name: "Manual Dose Outside B ml"
    icon: mdi:test-tube
    min: 0
    max: 250
    step: 5
    unit_of_measurement: "ml"
    mode: slider

#------------------------------------------------------------------------------
# Input Boolean Helpers
#------------------------------------------------------------------------------
input_boolean:
  # Added 25-08-04 to set a watchdog for autofill
  allow_auto_fill:
    name: Allow Auto Fill Trigger
    initial: false
    icon: mdi:check-circle-outline
