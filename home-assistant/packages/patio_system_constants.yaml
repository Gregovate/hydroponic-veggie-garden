#------------------------------------------------------------------------------
# Input Number Helpers
#------------------------------------------------------------------------------

input_number:
  #--------------------------------------------------------------------------
  # Nutrient Inventory
  #--------------------------------------------------------------------------

  nutrient_low_alert_level:
    name: "Alert if Remaining Nutrient <"
    min: 0
    max: 1000
    step: 50
    unit_of_measurement: "mL"

  #--------------------------------------------------------------------------
  # Patio-Specific Operating Constants
  #--------------------------------------------------------------------------

  target_tds_outside:
    name: "TDS Target (Outside)"
    min: 1800
    max: 2200
    step: 25
    unit_of_measurement: "ppm"
    mode: slider
    icon: mdi:target
