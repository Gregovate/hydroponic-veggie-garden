#   MariaDB logbook database.
#
# Responsibilities:
#   • Verify MariaDB connectivity
#   • Verify SQL integration is operational
#   • Verify Hydro-History database access
#   • Provide simple diagnostic sensors used during system startup
#
# Does NOT Contain:
#   • Dashboard entities
#   • History browser
#   • Inventory queries
#   • Harvest queries
#   • Workflow helpers
#
# Database:
#   logbook
#
# Related Packages:
#   • db_history_dashboard.yaml
#   • batch_building.yaml
#   • harvest_inputs.yaml
#
# Primary Database Objects:
#   • v_hydro_recent_activity
#
